<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f97316"/>
      <stop offset="100%" style="stop-color:#ea580c"/>
    </linearGradient>
    <clipPath id="circleClip">
      <circle cx="64" cy="64" r="60"/>
    </clipPath>
  </defs>

  <!-- Orange circle -->
  <circle cx="64" cy="64" r="60" fill="url(#bg)"/>

  <g clip-path="url(#circleClip)">

    <!-- Text line above -->
    <rect x="20" y="36" width="60" height="5" rx="2.5" fill="rgba(255,255,255,0.35)"/>

    <!-- Highlighted/selected text block — stretched wider -->
    <rect x="20" y="50" width="88" height="26" rx="5" fill="rgba(255,255,255,0.7)"/>
    <rect x="28" y="60" width="26" height="6" rx="2" fill="#ea580c"/>
    <rect x="58" y="60" width="34" height="6" rx="2" fill="#ea580c"/>

    <!-- Text line below -->
    <rect x="20" y="86" width="48" height="5" rx="2.5" fill="rgba(255,255,255,0.35)"/>

    <!-- I-beam cursor — pure white, thicker, with subtle glow -->
    <g transform="translate(90, 46)" filter="url(#glow)">
      <rect x="-7" y="0" width="14" height="3.5" rx="1.5" fill="#ffffff"/>
      <rect x="-2" y="0" width="4" height="34" rx="1.5" fill="#ffffff"/>
      <rect x="-7" y="30.5" width="14" height="3.5" rx="1.5" fill="#ffffff"/>
    </g>

  </g>

  <!-- Glow filter for cursor -->
  <defs>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
</svg>
